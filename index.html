<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Yuri Garden Reader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,Arial;background:#fff}

/* ===== HEADER ===== */
.header{
    position:fixed;top:0;left:0;right:0;height:60px;
    background:#fff;display:flex;align-items:center;
    justify-content:space-between;padding:0 15px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
    z-index:100;
}
.icon-btn{font-size:22px;background:none;border:none;cursor:pointer;color:#7b3fe4}
.mode-indicator{font-size:12px;padding:5px 10px;border-radius:20px}
.mode-read{background:#e3f2fd;color:#1976d2}
.mode-edit{background:#fff3e0;color:#f57c00}

/* ===== BANNER ===== */
.banner-container{margin-top:60px;position:relative}
.banner{width:100%;height:260px;object-fit:cover}
.change-banner-btn{
    position:absolute;bottom:15px;right:15px;
    padding:8px 14px;border-radius:20px;
    border:none;background:rgba(0,0,0,.6);
    color:#fff;display:none
}
.banner-container:hover .change-banner-btn{display:block}

/* ===== CONTENT ===== */
.content-wrapper{padding:25px 15px 120px}
.hidden{display:none}

/* ===== HOME PAGE ===== */
.story-header{display:flex;gap:25px}
.story-cover{width:220px;border-radius:12px}
.story-info h1{color:#7b3fe4;margin-bottom:8px}
.tag-list{display:flex;gap:8px;margin-bottom:10px}
.tag{background:#ffe3f1;color:#c2185b;padding:5px 12px;border-radius:20px;font-size:13px}
.story-meta{display:flex;gap:15px;font-size:14px;color:#666;margin:8px 0}
.story-actions{margin-top:12px;display:flex;gap:10px}
.story-tabs{display:flex;gap:10px;margin:30px 0 15px}
.tab{padding:10px 18px;border-radius:20px;border:none;background:#f3e5ff;cursor:pointer}
.tab.active{background:#7b3fe4;color:#fff}
.chapter-item{
    padding:15px;border-radius:12px;
    background:#fafafa;margin-bottom:10px;
    cursor:pointer
}
.chapter-item:hover{background:#ece3ff}

/* ===== READER ===== */
.chapter-title{font-size:22px;margin-bottom:20px}
.text-content{line-height:1.8;margin-bottom:18px}

/* ===== FOOTER ===== */
.footer-nav{
    position:fixed;bottom:0;left:0;right:0;
    background:#fff;box-shadow:0 -2px 10px rgba(0,0,0,.1)
}
.progress-bar{height:3px;background:#eee}
.progress-fill{height:100%;background:#7b3fe4;width:0%}
.chapter-selector{display:flex;align-items:center;padding:12px}
.nav-btn{font-size:22px;border:none;background:none;color:#7b3fe4}
.dropdown-btn{
    flex:1;margin:0 10px;padding:10px;
    border-radius:8px;border:1px solid #ddd;
    background:#f5f5f5;cursor:pointer
}
.dropdown-menu{
    position:absolute;bottom:60px;left:15px;right:15px;
    background:#fff;border-radius:8px;
    max-height:300px;overflow:auto;
    display:none
}
.dropdown-menu.show{display:block}
.dropdown-item{padding:12px;border-bottom:1px solid #eee;cursor:pointer}
.dropdown-item:hover{background:#f5f5f5}

/* ===== MODAL ===== */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200}
.modal.show{display:flex}
.modal-content{background:#fff;padding:25px;border-radius:15px;width:100%;max-width:450px}
.form-input,.form-textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;margin-top:8px}
.form-textarea{min-height:160px}
.btn{padding:10px;border:none;border-radius:8px;cursor:pointer}
.btn-primary{background:#7b3fe4;color:#fff}
.btn-secondary{background:#eee}
.btn-danger{background:#ff4444;color:#fff}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <button class="icon-btn" onclick="showHome()">🏠</button>
    <span id="modeIndicator" class="mode-indicator mode-read">📖 Chế độ Đọc</span>
    <div>
        <button class="icon-btn" id="editBtn" onclick="showPassword()">✏️</button>
        <button class="icon-btn hidden" id="addBtn" onclick="showAdd()">➕</button>
    </div>
</div>

<!-- BANNER -->
<div class="banner-container">
    <img id="banner" class="banner">
    <button class="change-banner-btn" id="bannerBtn" onclick="showBanner()">📷 Đổi ảnh</button>
</div>

<!-- HOME -->
<div class="content-wrapper" id="homePage">
    <div class="story-header">
        <img id="storyCover" class="story-cover">
        <div class="story-info">
            <h1 id="storyTitle"></h1>
            <div class="tag-list" id="tags"></div>
            <div class="story-meta">
                <span id="status"></span>
                <span>📅 <span id="update"></span></span>
                <span>👁️ <span id="views"></span></span>
                <span>🔖 <span id="follows"></span></span>
            </div>
            <div><b>Tác giả:</b> <span id="author"></span></div>
            <div><b>Nhóm:</b> <span id="group"></span></div>
            <div class="story-actions">
                <button class="btn btn-primary" onclick="continueRead()">📖 Tiếp tục đọc</button>
            </div>
        </div>
    </div>

    <div class="story-tabs">
        <button class="tab active">📚 Chapters</button>
        <button class="tab">🎨 Arts</button>
        <button class="tab">💬 Bình luận</button>
        <button class="tab">🔗 Liên quan</button>
    </div>

    <div id="homeChapters"></div>
</div>

<!-- READER -->
<div class="content-wrapper hidden" id="readerPage">
    <h2 class="chapter-title" id="chapterTitle"></h2>
    <div id="chapterContent"></div>
</div>

<!-- FOOTER -->
<div class="footer-nav">
    <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
    <div class="chapter-selector">
        <button class="nav-btn" onclick="prevChapter()">←</button>
        <button class="dropdown-btn" onclick="toggleDropdown()" id="currentChapter">Chọn chapter</button>
        <button class="nav-btn" onclick="nextChapter()">→</button>
    </div>
    <div class="dropdown-menu" id="dropdown"></div>
</div>

<script>
/* ===== DATA ===== */
const story={
 title:"Giải thoát tớ đi",
 author:"Daiba Chaya",
 group:"ILAS",
 status:"Đã hoàn thành",
 update:"16/1/2026",
 views:"10.8K",
 follows:103,
 tags:["All Girl","Doujinshi","Futanari"],
 cover:"https://i.redd.it/fd92bpdhjvad1.png"
};

let chapters=JSON.parse(localStorage.chapters||"[]");
let bannerUrl=localStorage.banner||story.cover;
let password=localStorage.password||"admin";
let edit=false;
let current=0;

/* ===== INIT ===== */
banner.src=bannerUrl;
storyCover.src=story.cover;
storyTitle.textContent=story.title;
author.textContent=story.author;
group.textContent=story.group;
status.textContent="✔ "+story.status;
update.textContent=story.update;
views.textContent=story.views;
follows.textContent=story.follows;
story.tags.forEach(t=>tags.innerHTML+=`<span class="tag">${t}</span>`);

renderHome();

/* ===== HOME ===== */
function renderHome(){
 homePage.classList.remove("hidden");
 readerPage.classList.add("hidden");
 homeChapters.innerHTML="";
 chapters.forEach((c,i)=>{
   homeChapters.innerHTML+=`<div class="chapter-item" onclick="openChapter(${i})">${c.title}</div>`;
 });
}

function continueRead(){ openChapter(current||0); }

/* ===== READER ===== */
function openChapter(i){
 current=i;
 homePage.classList.add("hidden");
 readerPage.classList.remove("hidden");
 renderChapter();
}

function renderChapter(){
 const ch=chapters[current];
 if(!ch) return;
 chapterTitle.textContent=ch.title;
 currentChapter.textContent=ch.title;
 chapterContent.innerHTML=ch.content;
 renderDropdown();
 window.scrollTo(0,0);
}

function renderDropdown(){
 dropdown.innerHTML="";
 chapters.forEach((c,i)=>{
   dropdown.innerHTML+=`<div class="dropdown-item" onclick="openChapter(${i})">${c.title}</div>`;
 });
}

function toggleDropdown(){ dropdown.classList.toggle("show"); }
function prevChapter(){ if(current>0) openChapter(current-1); }
function nextChapter(){ if(current<chapters.length-1) openChapter(current+1); }

/* ===== HOME BTN ===== */
function showHome(){ renderHome(); }

/* ===== SCROLL ===== */
window.addEventListener("scroll",()=>{
 const h=document.documentElement.scrollHeight-innerHeight;
 progress.style.width=(scrollY/h*100)+"%";
});
</script>

</body>
</html>
